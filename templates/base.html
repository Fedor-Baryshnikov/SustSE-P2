<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="vh-100">
    <div class="h-100 d-flex">
        <div class="sidebar flex-column p-3" style="width: 280px;">
            <a href="/" class="d-flex align-items-center mb-4 mt-2 text-white text-decoration-none px-2">
                <i class="fa-solid fa-layer-group me-3 fs-5 text-primary"></i>
                <span class="fs-5 fw-bold tracking-tight">Pulse Chat</span>
            </a>
            <button class="btn btn-primary mb-4 text-start w-100 shadow-sm rounded-pill action-btn" id="new-chat-btn">
                <i class="fa-solid fa-plus me-2 ms-1"></i>New Chat
            </button>
            <div class="overflow-auto flex-grow-1 chat-list-container" id="chat-history-list">
                {% block sidebar %}
                {% endblock %}
            </div>
            <button class="btn btn-dark w-100 align-items-center mt-3 justify-content-center" data-bs-toggle="modal" data-bs-target="#statsModal" id="stats-btn">
                <i class="fa-solid fa-chart-line me-2 text-info"></i> Usage Stats
            </button>
        </div>
        <div class="main-content flex-grow-1 d-flex flex-column h-100">
            {% block content %}
            {% endblock %}
        </div>
    </div>
    <div class="modal fade" id="statsModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-panel">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Usage Statistics</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>   
          </div>
          <div class="modal-body">
            <div class="d-flex justify-content-between mb-4">
                <span>Total Chats</span>
                <span id="stat-chat-count" class="fw-bold text-white">...</span>
            </div>
            <div class="d-flex justify-content-between mb-4">
                <span>Messages Sent</span>
                <span id="stat-message-count" class="fw-bold text-white">...</span>
            </div>
            <div class="d-flex justify-content-between mb-4">
                <span>Output Tokens</span>
                <span id="stat-token-count" class="fw-bold text-info">...</span>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <span>Energy Saved</span>
                <span id="stat-energy-saved" class="fw-bold text-success">...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
